[workspace]
channels = ["conda-forge"]
platforms = ["win-64"]

[dependencies]
python = "3.12.*"
pip = "*"
setuptools = ">=80.9,<82"
cmake = ">=3.30"
ninja = ">=1.12"
git = "*"
ccache = "*"
pillow = ">=12,<13"
libpng = ">=1.6,<2"
libjpeg-turbo = ">=3,<4"
libwebp-base = ">=1.6,<2"

[pypi-dependencies]
cppheaderparser = ">=2.7.4"
build = ">=1.2.2"
meson = ">=1.7.0"
pre-commit = ">=4.3.0"
pyyaml = "==6.0.2"
pyzstd = ">=0.16.0"
setuptools = ">=80.9.0,<82.0.0"
pytest-cmake = "==0.13.0"
mako = ">=1.1.3"
jinja2 = ">=3.0.0"
pyelftools = ">=0.29"
boto3 = ">=1.42.79,<1.42.85"
joblib = ">=1.4.2"
msgpack = ">=1.1.0"
zstandard = ">=0.19.0"
lit = "==18.1.8"
psutil = "==7.1.3"
dvc = ">=3.0"

[activation.env]
PYTORCH_ROCM_ARCH = "gfx1030"
MAX_JOBS = "1"
CMAKE_BUILD_PARALLEL_LEVEL = "1"

[tasks]
check-therock-reqs = { cmd = ["python", "-c", "import CppHeaderParser, boto3, yaml, psutil; print('TheRock Python requirements are available')"], description = "Verify TheRock Python requirements in the pixi environment." }
install-therock-reqs = { depends-on = ["check-therock-reqs"], description = "Compatibility alias for checking TheRock Python requirements." }
validate-windows = { cmd = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "tools/rx6900_rocm_build.ps1", "validate"], description = "Validate the Windows build machine and Visual Studio toolchain." }
checkout-pytorch = { cmd = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "tools/rx6900_rocm_build.ps1", "checkout"], depends-on = ["check-therock-reqs"], description = "Checkout this fork as the PyTorch source used by TheRock." }
checkout-vision = { cmd = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "tools/rx6900_rocm_build.ps1", "checkout-vision"], depends-on = ["check-therock-reqs"], description = "Checkout and HIPIFY the PyTorch-pinned torchvision source." }
build-torch-wheel = { cmd = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "tools/rx6900_rocm_build.ps1", "build"], depends-on = ["check-therock-reqs"], description = "Build a torch-only ROCm wheel for RX 6900 XT / gfx1030." }
build-vision-wheel = { cmd = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "tools/rx6900_rocm_build.ps1", "build-vision"], depends-on = ["check-therock-reqs"], description = "Build a matching torchvision ROCm wheel for RX 6900 XT / gfx1030." }
install-built-wheel = { cmd = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "tools/rx6900_rocm_build.ps1", "install-wheel"], description = "Install the newest built torch wheel into this pixi environment." }
install-vision-wheel = { cmd = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "tools/rx6900_rocm_build.ps1", "install-vision-wheel"], description = "Install the newest built torchvision wheel into this pixi environment." }
smoke-test = { cmd = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "tools/rx6900_rocm_build.ps1", "smoke"], description = "Run the RX 6900 XT ROCm torch smoke test." }
smoke-vision = { cmd = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "tools/rx6900_rocm_build.ps1", "smoke-vision"], description = "Run torchvision import, transform, and CUDA NMS smoke tests." }
probe-built-wheel = { cmd = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "tools/rx6900_rocm_build.ps1", "probe"], description = "Run functional and CPU/GPU performance probes for the installed RX 6900 XT ROCm torch wheel." }
