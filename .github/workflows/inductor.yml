# Owner(s): ["oncall: pt2"]
# Workflow: Inductor
# runs all inductor tests, including both benchmark tests and unit tests.
# adding New Tests:
#  1. inductor-unittest.yml:
#      - Unit Tests
#      - Mixed Tests
#      - Flaky Benchmark tests
#  2. inductor.yml(this workflow):
#      - non-flaky benchmark tests
name: inductor

on:
  # REPRO(neutered): dispatch-only so a push/ciflow does NOT fan out the fleet.
  # Revert this whole file before merging.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}-${{ github.ref_type == 'branch' && github.sha }}-${{ github.event_name == 'workflow_dispatch' && github.run_id }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  # REPRO(neutered): single job that runs ONLY the OSDC inductor shard tripping
  # AOTInductorLoggingTest::test_shape_env_reuse_zero_consts_use_consts_asm_false.
  # No build -- _linux-test.yml pulls the prebuilt wheel from S3 (run 28131511097)
  # and patches in the current logging_utils.py PT2_HANDLER_LEAK diagnostic.
  # Revert this whole file before merging.
  repro:
    if: github.repository_owner == 'pytorch'
    name: inductor-osdc-logging-repro
    uses: ./.github/workflows/_linux-test.yml
    with:
      build-environment: linux-jammy-cuda13.0-py3.10-gcc11-sm86
      # use-arc -> the test-osdc job, which runs the test inside this container
      # image (must be a fully pullable ref; ghcr public mirror, hash from the
      # original failing run d7c3a775...).
      use-arc: true
      docker-image: ghcr.io/pytorch/ci-image:pytorch-linux-jammy-cuda13.0-cudnn9-py3-gcc11-inductor-benchmarks-d7c3a775b9c8add331f6701cc37e5770e784be19
      test-matrix: |
        { include: [
          { config: "inductor", shard: 1, num_shards: 1, runner: "mt-l-x86aavx2-29-113-a10g" },
        ]}
      python-version: "3.10"
      compiler: gcc11
      cuda-version: "13.0"
    secrets: inherit
